<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Windows 98 模拟器</title>
  <!-- Tailwind CSS v3 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome -->
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'win98-blue': '#008080',
            'win98-light-blue': '#00a0a0',
            'win98-dark-blue': '#006060',
            'win98-yellow': '#ffcc00',
            'win98-taskbar': '#c0c0c0',
            'win98-border': '#000000',
            'win98-window-bg': '#ffffff',
            'win98-titlebar': '#000080',
          },
          fontFamily: {
            'win98': ['MS Sans Serif', 'Arial', 'sans-serif'],
          },
          boxShadow: {
            'win98-inset': 'inset -1px -1px 0 #ffffff, inset 1px 1px 0 #808080',
            'win98-button': '1px 1px 0 #000000',
            'win98-window': '2px 2px 0 #000000',
          }
        }
      }
    }
  </script>
  
  <style type="text/tailwindcss">
    @layer utilities {
      .win98-border {
        border: 1px solid #000000;
        box-shadow: inset -1px -1px 0 #ffffff, inset 1px 1px 0 #808080;
      }
      
      .win98-button {
        border: 1px solid #000000;
        background-color: #c0c0c0;
        box-shadow: 1px 1px 0 #000000;
      }
      
      .win98-button:active {
        box-shadow: inset -1px -1px 0 #000000, inset 1px 1px 0 #808080;
        transform: translate(1px, 1px);
      }
      
      .win98-window {
        border: 1px solid #000000;
        background-color: #ffffff;
        box-shadow: 2px 2px 0 #000000;
      }
      
      .win98-titlebar {
        background-color: #000080;
        color: #ffffff;
        border-bottom: 1px solid #000000;
      }
      
      .win98-icon {
        transition: transform 0.1s;
      }
      
      .win98-icon:hover {
        transform: scale(1.05);
      }
      
      .win98-icon:active {
        transform: scale(0.95);
      }
      
      .window-content {
        display: none;
        position: absolute;
        z-index: 10;
      }
      
      .window-content.active {
        display: block;
      }
      
      .taskbar-button.active {
        background-color: #000080;
        color: #ffffff;
      }
      
      /* 自定义滚动条 */
      ::-webkit-scrollbar {
        width: 16px;
        height: 16px;
      }
      
      ::-webkit-scrollbar-track {
        background: #c0c0c0;
        border: 1px solid #000000;
      }
      
      ::-webkit-scrollbar-thumb {
        background: #c0c0c0;
        border: 1px solid #000000;
        box-shadow: inset -1px -1px 0 #ffffff, inset 1px 1px 0 #808080;
      }
      
      ::-webkit-scrollbar-button {
        background: #c0c0c0;
        border: 1px solid #000000;
        box-shadow: 1px 1px 0 #000000;
        width: 16px;
        height: 16px;
      }
    }
  </style>
</head>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // 更新当前时间
      function updateTime() {
        const now = new Date();
        const hours = now.getHours().toString().padStart(2, '0');
        const minutes = now.getMinutes().toString().padStart(2, '0');
        document.getElementById('current-time').textContent = `${hours}:${minutes}`;
      }
      
      updateTime();
      setInterval(updateTime, 60000);
      
      // 窗口管理
      const windows = document.querySelectorAll('.window-content');
      const taskbarButtons = document.getElementById('taskbar-buttons');
      let activeWindow = null;
      
      // 激活窗口函数
      function activateWindow(windowElement) {
        // 移除所有窗口的活动状态
        windows.forEach(win => win.classList.remove('active'));
        
        // 移除所有任务栏按钮的活动状态
        document.querySelectorAll('.taskbar-button').forEach(btn => btn.classList.remove('active'));
        
        // 激活当前窗口
        windowElement.classList.add('active');
        activeWindow = windowElement;
        
        // 激活对应的任务栏按钮
        const windowId = windowElement.id;
        const taskbarButton = document.querySelector(`.taskbar-button[data-window="${windowId}"]`);
        if (taskbarButton) {
          taskbarButton.classList.add('active');
        }
        
        // 将窗口移到最前面
        windows.forEach(win => win.style.zIndex = '10');
        windowElement.style.zIndex = '20';
      }
      
      // 创建任务栏按钮
      function createTaskbarButton(windowElement) {
        const windowId = windowElement.id;
        const windowTitle = windowElement.querySelector('.win98-titlebar span').textContent;
        const windowIcon = windowElement.querySelector('.win98-titlebar img').src;
        
        // 检查是否已存在该窗口的任务栏按钮
        if (document.querySelector(`.taskbar-button[data-window="${windowId}"]`)) {
          return;
        }
        
        const button = document.createElement('button');
        button.className = 'taskbar-button win98-button px-3 py-1 text-sm flex items-center gap-1';
        button.setAttribute('data-window', windowId);
        button.innerHTML = `
          <img src="${windowIcon}" alt="${windowTitle}" class="w-4 h-4">
          <span>${windowTitle}</span>
        `;
        
        button.addEventListener('click', function() {
          const targetWindow = document.getElementById(windowId);
          if (targetWindow.classList.contains('active')) {
            // 如果窗口已经是活动的，则最小化
            targetWindow.classList.remove('active');
            this.classList.remove('active');
          } else {
            // 否则激活窗口
            activateWindow(targetWindow);
          }
        });
        
        taskbarButtons.appendChild(button);
      }
      
      // 关闭窗口函数
      function closeWindow(windowElement) {
        windowElement.classList.remove('active');
        
        // 移除对应的任务栏按钮
        const windowId = windowElement.id;
        const taskbarButton = document.querySelector(`.taskbar-button[data-window="${windowId}"]`);
        if (taskbarButton) {
          taskbarButton.remove();
        }
        
        // 如果关闭的是活动窗口，激活下一个窗口
        if (activeWindow === windowElement) {
          const remainingWindows = Array.from(windows).filter(win => win.classList.contains('active'));
          if (remainingWindows.length > 0) {
            activateWindow(remainingWindows[0]);
          } else {
            activeWindow = null;
          }
        }
      }
      
      // 最小化窗口函数
      function minimizeWindow(windowElement) {
        windowElement.classList.remove('active');
        
        // 移除任务栏按钮的活动状态
        const windowId = windowElement.id;
        const taskbarButton = document.querySelector(`.taskbar-button[data-window="${windowId}"]`);
        if (taskbarButton) {
          taskbarButton.classList.remove('active');
        }
      }
      
      // 最大化窗口函数
      function maximizeWindow(windowElement) {
        const rect = windowElement.getBoundingClientRect();
        const isMaximized = windowElement.classList.contains('maximized');
        
        if (isMaximized) {
          // 恢复原始大小和位置
          windowElement.classList.remove('maximized');
          windowElement.style.width = windowElement.dataset.originalWidth;
          windowElement.style.height = windowElement.dataset.originalHeight;
          windowElement.style.top = windowElement.dataset.originalTop;
          windowElement.style.left = windowElement.dataset.originalLeft;
        } else {
          // 保存原始大小和位置
          windowElement.dataset.originalWidth = rect.width + 'px';
          windowElement.dataset.originalHeight = rect.height + 'px';
          windowElement.dataset.originalTop = windowElement.style.top;
          windowElement.dataset.originalLeft = windowElement.style.left;
          
          // 最大化窗口
          windowElement.classList.add('maximized');
          windowElement.style.width = (window.innerWidth - 40) + 'px';
          windowElement.style.height = (window.innerHeight - 100) + 'px';
          windowElement.style.top = '20px';
          windowElement.style.left = '20px';
        }
      }
      
      // 窗口拖拽功能
      windows.forEach(window => {
        const titlebar = window.querySelector('.win98-titlebar');
        let isDragging = false;
        let offsetX, offsetY;
        
        titlebar.addEventListener('mousedown', function(e) {
          if (e.target.tagName === 'BUTTON' || e.target.parentElement.tagName === 'BUTTON') {
            return; // 如果点击的是按钮，不启动拖拽
          }
          
          isDragging = true;
          offsetX = e.clientX - window.getBoundingClientRect().left;
          offsetY = e.clientY - window.getBoundingClientRect().top;
          
          // 激活当前窗口
          activateWindow(window);
          
          // 阻止默认行为和冒泡
          e.preventDefault();
        });
        
        document.addEventListener('mousemove', function(e) {
          if (!isDragging) return;
          
          const x = e.clientX - offsetX;
          const y = e.clientY - offsetY;
          
          // 限制窗口不超出视口
          const maxX = window.innerWidth - window.offsetWidth - 10;
          const maxY = window.innerHeight - window.offsetHeight - 10;
          
          window.style.left = Math.max(0, Math.min(x, maxX)) + 'px';
          window.style.top = Math.max(0, Math.min(y, maxY)) + 'px';
        });
        
        document.addEventListener('mouseup', function() {
          isDragging = false;
        });
        
        // 窗口按钮事件
        window.querySelectorAll('.window-button').forEach(button => {
          button.addEventListener('click', function() {
            const action = this.getAttribute('data-action');
            
            switch (action) {
              case 'close':
                closeWindow(window);
                break;
              case 'minimize':
                minimizeWindow(window);
                break;
              case 'maximize':
                maximizeWindow(window);
                break;
            }
          });
        });
      });
      
      // 桌面图标双击事件
      document.querySelectorAll('.win98-icon').forEach(icon => {
        icon.addEventListener('dblclick', function() {
          const targetWindowId = this.getAttribute('data-target');
          const targetWindow = document.getElementById(targetWindowId);
          
          if (targetWindow) {
            // 创建任务栏按钮
            createTaskbarButton(targetWindow);
            
            // 激活窗口
            activateWindow(targetWindow);
          }
        });
      });
      
      // 开始菜单
      const startButton = document.getElementById('start-button');
      const startMenu = document.getElementById('start-menu');
      
      startButton.addEventListener('click', function() {
        startMenu.classList.toggle('hidden');
      });
      
      // 点击其他地方关闭开始菜单
      document.addEventListener('click', function(e) {
        if (!startButton.contains(e.target) && !startMenu.contains(e.target)) {
          startMenu.classList.add('hidden');
        }
      });
      
      // 点击窗口外部时不关闭窗口
      document.getElementById('desktop').addEventListener('click', function(e) {
        if (e.target === this) {
          // 可以在这里添加点击桌面的效果，比如显示桌面
        }
      });
    });
  </script>
</body>
